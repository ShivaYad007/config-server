server:
  port: ${PORT}

spring:
  application:
    name: billing-service

  # --- REDIS CONFIGURATION START ---
  cache:
    type: redis
    redis:
      time-to-live: 600000        # 10 minutes in milliseconds
      cache-null-values: false
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD} # Uncomment if your Redis requires a password
  # --- REDIS CONFIGURATION END ---

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: billing-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.nwf.billing.dto.kafka

logging:
  level:
    root: INFO
    com.nwf.billing: DEBUG
    org.springframework.batch: INFO
